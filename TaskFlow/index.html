<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Flow Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
  Task Flow Manager
</header>

<!-- Input Section -->
<section class="input-section">
  <input type="text" id="taskInput" placeholder="Enter a new task...">
  <button id="addBtn">Add Task</button>
</section>

<!-- Board -->
<section class="board">

  <!-- TO DO -->
  <div class="column">
    <h2>To Do</h2>
    <div id="todo-list"></div>
  </div>

  <!-- IN PROGRESS -->
  <div class="column">
    <h2>In Progress</h2>
    <div id="inprogress-list"></div>
  </div>

  <!-- DONE -->
  <div class="column">
    <h2>Done</h2>
    <div id="done-list"></div>
  </div>

</section>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
